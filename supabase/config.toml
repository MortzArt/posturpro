# Supabase CLI project configuration for PosturPro.
# Full reference: https://supabase.com/docs/guides/local-development/cli/config

project_id = "posturpro"

[db]
# Port used by `supabase start` (local dev database).
port = 54322
# Postgres major version (matches Supabase managed default).
major_version = 17

[db.migrations]
# Migration files live in supabase/migrations/ and are applied in filename
# (lexicographic) order: 0001 -> 0005.
schema_paths = []

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[studio]
enabled = true
port = 54323

[auth]
enabled = false

# The analytics (Logflare) + vector stack is heavy and flaky on ARM Docker; it
# is not needed for local schema/RLS/seed work. Disabling it lets the core DB +
# API stack come up reliably.
[analytics]
enabled = false

# Storage is ENABLED for T11 admin product-image uploads (the `product-images`
# public bucket is created in migration 0011). It was disabled on 2026-07-14
# because its container ran ~30s of vector_store migrations before binding port
# 5000 and, under Docker load, exceeded the CLI health-check window — aborting
# `supabase start`/`db reset`. Root cause was the analytics/vector coupling, NOT
# storage itself: with [analytics] kept OFF (below), the storage container binds
# within the window for a plain buckets+objects workload. Verified with a clean
# `supabase stop && supabase start && supabase db reset` before ship (T11 AC-2 /
# edge 10). If this regresses, the documented fallback is a filesystem/`public/`
# dev shim behind the same `src/lib/admin/products/image-write.ts` interface.
[storage]
enabled = true

# No edge functions exist (no supabase/functions/). The runtime container had
# been dead for a day with every suite green before this was turned off.
[edge_runtime]
enabled = false
